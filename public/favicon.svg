<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="1"/>
    </radialGradient>

    <!-- Cloak gradient -->
    <linearGradient id="cloak" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Cloak inner highlight -->
    <linearGradient id="cloakHighlight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>

    <!-- Staff gradient -->
    <linearGradient id="staff" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <!-- Orb main gradient -->
    <radialGradient id="orb" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="40%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>

    <!-- Orb inner glow -->
    <radialGradient id="orbInner" cx="40%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb outer glow -->
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Hood shadow -->
    <linearGradient id="hoodShadow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Accent trim gradient -->
    <linearGradient id="trim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glow filter for the orb -->
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow for eyes -->
    <filter id="eyeFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>

    <!-- Large ambient glow -->
    <filter id="ambientGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#030712"/>
  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- Ambient orb light cast on background -->
  <ellipse cx="310" cy="130" rx="120" ry="100" fill="url(#orbGlow)" filter="url(#ambientGlow)" opacity="0.6"/>

  <!-- Cloak / body -->
  <path d="
    M 256 155
    C 220 155, 175 195, 160 260
    C 145 325, 130 400, 125 470
    L 387 470
    C 382 400, 367 325, 352 260
    C 337 195, 292 155, 256 155
    Z
  " fill="url(#cloak)"/>

  <!-- Cloak highlight -->
  <path d="
    M 256 155
    C 235 155, 200 185, 185 235
    C 170 285, 155 360, 150 470
    L 260 470
    C 260 370, 255 270, 256 155
    Z
  " fill="url(#cloakHighlight)"/>

  <!-- Cloak trim / border accent -->
  <path d="
    M 256 155
    C 220 155, 175 195, 160 260
    C 145 325, 130 400, 125 470
  " fill="none" stroke="url(#trim)" stroke-width="2" opacity="0.7"/>
  <path d="
    M 256 155
    C 292 155, 337 195, 352 260
    C 367 325, 382 400, 387 470
  " fill="none" stroke="url(#trim)" stroke-width="2" opacity="0.5"/>

  <!-- Hood -->
  <path d="
    M 256 105
    C 210 105, 175 135, 175 175
    C 175 205, 195 230, 220 240
    L 256 245
    L 292 240
    C 317 230, 337 205, 337 175
    C 337 135, 302 105, 256 105
    Z
  " fill="url(#cloak)"/>

  <!-- Hood inner shadow (face area) -->
  <path d="
    M 220 195
    C 225 175, 240 165, 256 165
    C 272 165, 287 175, 292 195
    C 295 210, 290 230, 280 238
    L 256 243
    L 232 238
    C 222 230, 217 210, 220 195
    Z
  " fill="url(#hoodShadow)"/>

  <!-- Eyes - glow layer -->
  <ellipse cx="238" cy="205" rx="10" ry="6" fill="#38bdf8" filter="url(#eyeFilter)" opacity="0.6"/>
  <ellipse cx="274" cy="205" rx="10" ry="6" fill="#38bdf8" filter="url(#eyeFilter)" opacity="0.6"/>

  <!-- Eyes - solid -->
  <ellipse cx="238" cy="205" rx="6" ry="3.5" fill="#38bdf8"/>
  <ellipse cx="274" cy="205" rx="6" ry="3.5" fill="#38bdf8"/>

  <!-- Eye highlights -->
  <ellipse cx="235" cy="203" rx="2" ry="1.5" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="271" cy="203" rx="2" ry="1.5" fill="#ffffff" opacity="0.8"/>

  <!-- Staff -->
  <rect x="318" y="120" width="6" height="350" rx="3" fill="url(#staff)" opacity="0.9"/>

  <!-- Staff node connectors (small orbiting nodes) -->
  <line x1="321" y1="145" x2="295" y2="130" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="321" y1="145" x2="345" y2="125" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="321" y1="145" x2="335" y2="160" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>

  <!-- Small orbiting nodes -->
  <circle cx="295" cy="130" r="5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="345" cy="125" r="4" fill="#60a5fa" opacity="0.5"/>
  <circle cx="335" cy="160" r="3.5" fill="#c084fc" opacity="0.5"/>

  <!-- Orb glow (large, behind) -->
  <circle cx="321" cy="115" r="40" fill="url(#orbGlow)" filter="url(#ambientGlow)" opacity="0.7"/>

  <!-- Main orb -->
  <circle cx="321" cy="115" r="22" fill="url(#orb)" filter="url(#glowFilter)"/>

  <!-- Orb inner highlight -->
  <circle cx="315" cy="108" r="10" fill="url(#orbInner)"/>

  <!-- Orb specular -->
  <ellipse cx="313" cy="106" rx="4" ry="3" fill="#ffffff" opacity="0.5"/>

  <!-- Floating particles -->
  <circle cx="155" cy="300" r="2" fill="#60a5fa" opacity="0.3"/>
  <circle cx="370" cy="350" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="180" cy="400" r="1.8" fill="#c084fc" opacity="0.2"/>
  <circle cx="350" cy="250" r="2.2" fill="#60a5fa" opacity="0.2"/>
  <circle cx="140" cy="200" r="1.5" fill="#ec4899" opacity="0.15"/>
  <circle cx="380" cy="180" r="1.8" fill="#93c5fd" opacity="0.2"/>
</svg>
